 
{% extends "base.html" %}
{% block content %}
<div class="container">
    <h2 class="mb-4"><i class="fas fa-video"></i> AI HR Avatar Interview</h2>
    <p class="text-muted">Experience a realistic interview with AI avatar</p>
    
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5>Interview Avatar</h5>
                </div>
                <div class="card-body text-center">
                    <canvas id="avatarCanvas" width="400" height="400" style="border-radius: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></canvas>
                    <div id="avatarStatus" class="alert alert-info mt-3">
                        <i class="fas fa-microphone"></i> Click "Start Interview" to begin
                    </div>
                    <button id="startAvatarBtn" class="btn btn-success btn-lg">🎤 Start Interview</button>
                    <button id="stopAvatarBtn" class="btn btn-danger btn-lg" style="display: none;">⏹️ Stop</button>
                </div>
            </div>
        </div>
        
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h5><i class="fas fa-comments"></i> Interview Session</h5>
                </div>
                <div class="card-body" style="height: 400px; overflow-y: auto;">
                    <div id="interviewMessages">
                        <div class="alert alert-secondary">AI Avatar: Hello! I'm your virtual interviewer. Let's begin!</div>
                    </div>
                </div>
                <div class="card-footer">
                    <div class="input-group">
                        <input type="text" id="avatarAnswer" class="form-control" placeholder="Type your answer..." disabled>
                        <button id="sendAvatarBtn" class="btn btn-primary" disabled>Send</button>
                        <button id="speakAvatarBtn" class="btn btn-warning" disabled><i class="fas fa-microphone"></i> Speak</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let ctx, canvas, interviewActive = false, currentQuestion = "";
    let recognition = null;
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';
    }
    
    function drawAvatar(emotion = 'neutral') {
        if (!ctx) return;
        ctx.clearRect(0, 0, 400, 400);
        ctx.fillStyle = '#FFDAB9';
        ctx.beginPath();
        ctx.arc(200, 200, 120, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(150, 170, 15, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(250, 170, 15, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(145, 165, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(245, 165, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        if (emotion === 'smile') ctx.arc(200, 230, 30, 0.1, Math.PI - 0.1);
        else if (emotion === 'thinking') ctx.arc(200, 230, 25, 0, Math.PI);
        else ctx.arc(200, 230, 25, 0.1, Math.PI - 0.1);
        ctx.stroke();
        ctx.fillStyle = '#FFB6C1';
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.ellipse(130, 210, 15, 10, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(270, 210, 15, 10, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
    
    canvas = document.getElementById('avatarCanvas');
    ctx = canvas.getContext('2d');
    drawAvatar('neutral');
    
    function speakAsAvatar(text, callback) {
        drawAvatar('smile');
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.9;
        utterance.onend = () => { drawAvatar('neutral'); if (callback) callback(); };
        speechSynthesis.speak(utterance);
    }
    
    function addMessage(sender, message, isUser = false) {
        const container = document.getElementById('interviewMessages');
        const div = document.createElement('div');
        div.className = `alert alert-${isUser ? 'info' : 'secondary'}`;
        div.innerHTML = `<strong>${sender}:</strong> ${message}`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
    
    function loadNextQuestion() {
        fetch('/chatbot_get_question')
            .then(res => res.json())
            .then(data => {
                if (data.finished) {
                    addMessage('AI Avatar', '🎉 Congratulations! Interview complete!', false);
                    interviewActive = false;
                    document.getElementById('stopAvatarBtn').click();
                    return;
                }
                currentQuestion = data.question;
                addMessage('AI Avatar', currentQuestion, false);
                speakAsAvatar(currentQuestion);
            });
    }
    
    function submitAnswer() {
        const answer = document.getElementById('avatarAnswer').value.trim();
        if (!answer) return;
        addMessage('You', answer, true);
        document.getElementById('avatarAnswer').value = '';
        fetch('/chatbot_submit_answer', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({answer: answer})
        }).then(res => res.json())
          .then(data => {
              addMessage('AI Avatar', `Score: ${data.score}/10. ${data.feedback}`, false);
              speakAsAvatar(`You scored ${data.score} out of 10. ${data.feedback}`);
              if (!data.finished) setTimeout(() => loadNextQuestion(), 2000);
          });
    }
    
    document.getElementById('startAvatarBtn').addEventListener('click', () => {
        fetch('/chatbot_reset', {method: 'POST'}).then(() => {
            interviewActive = true;
            document.getElementById('startAvatarBtn').style.display = 'none';
            document.getElementById('stopAvatarBtn').style.display = 'inline-block';
            document.getElementById('avatarAnswer').disabled = false;
            document.getElementById('sendAvatarBtn').disabled = false;
            document.getElementById('speakAvatarBtn').disabled = false;
            document.getElementById('interviewMessages').innerHTML = '<div class="alert alert-secondary">AI Avatar: Hello! I\'m your virtual interviewer. Let\'s begin!</div>';
            loadNextQuestion();
        });
    });
    
    document.getElementById('stopAvatarBtn').addEventListener('click', () => {
        interviewActive = false;
        location.reload();
    });
    document.getElementById('sendAvatarBtn').addEventListener('click', submitAnswer);
    document.getElementById('avatarAnswer').addEventListener('keypress', (e) => { if (e.key === 'Enter') submitAnswer(); });
    if (recognition) {
        recognition.onresult = (event) => {
            document.getElementById('avatarAnswer').value = event.results[0][0].transcript;
            submitAnswer();
        };
        document.getElementById('speakAvatarBtn').addEventListener('click', () => {
            if (interviewActive) recognition.start();
        });
    }
</script>
{% endblock %}
