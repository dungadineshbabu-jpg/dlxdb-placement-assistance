{% extends "base.html" %}
{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">🎙️ Voice Interview (AI speaks, you answer)</h4>
                    <small>{{ company }} | {{ role }}</small>
                </div>
                <div class="card-body">
                    <!-- Voice test area -->
                    <div class="alert alert-secondary">
                        <strong>🔊 Test Voice & Mic:</strong>
                        <button id="testVoiceBtn" class="btn btn-sm btn-outline-primary">Hear AI Voice</button>
                        <button id="testMicBtn" class="btn btn-sm btn-outline-success ms-2">Test Microphone</button>
                        <span id="voiceStatus" class="ms-2"></span>
                    </div>

                    <!-- Progress bar -->
                    <div class="mb-3">
                        <div class="progress">
                            <div id="roundProgress" class="progress-bar" role="progressbar" style="width: 0%">0%</div>
                        </div>
                        <div id="roundName" class="text-center mt-1 fw-bold"></div>
                    </div>

                    <!-- Current question display -->
                    <div id="questionArea" class="mb-4 p-3 border rounded" style="min-height: 120px;">
                        <h5 id="questionText">Click "Start Interview" to begin</h5>
                        <small id="questionMeta" class="text-muted"></small>
                    </div>

                    <!-- Answer area (hidden until question is asked) -->
                    <div id="answerArea" style="display: none;">
                        <label class="form-label">Your Answer (speak or type):</label>
                        <textarea id="answerText" class="form-control mb-2" rows="3" placeholder="Your answer will appear here..."></textarea>
                        <button id="listenBtn" class="btn btn-warning me-2"><i class="fas fa-microphone"></i> Speak Answer</button>
                        <button id="submitBtn" class="btn btn-success"><i class="fas fa-paper-plane"></i> Submit</button>
                    </div>

                    <!-- Feedback area -->
                    <div id="resultArea" class="mt-3" style="display: none;">
                        <div class="alert alert-secondary">
                            <strong>Score: <span id="scoreSpan">0</span>/10</strong><br>
                            <strong>Feedback:</strong> <span id="feedbackSpan"></span>
                        </div>
                        <button id="nextBtn" class="btn btn-primary">Next Question →</button>
                    </div>

                    <!-- Start / Reset -->
                    <div id="startArea" class="text-center">
                        <button id="startBtn" class="btn btn-success btn-lg"><i class="fas fa-play"></i> Start Interview</button>
                        <button id="resetBtn" class="btn btn-secondary btn-lg"><i class="fas fa-redo"></i> Reset</button>
                    </div>

                    <!-- Completion -->
                    <div id="completeArea" style="display: none;">
                        <div class="alert alert-success text-center">
                            <i class="fas fa-trophy fa-2x"></i>
                            <h4>Interview Complete!</h4>
                            <p>Great job! You've completed all rounds.</p>
                            <a href="{{ url_for('dashboard') }}" class="btn btn-primary">Back to Dashboard</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== SPEECH SYNTHESIS (AI speaks) ==========
    let synthesis = window.speechSynthesis;
    let voices = [];
    let selectedVoice = null;
    let voicesReady = false;
    let currentUtterance = null;

    function loadVoices() {
        voices = synthesis.getVoices();
        if (voices.length > 0) {
            selectedVoice = voices.find(v => v.lang === 'en-US' && (v.name.includes('Google') || v.name.includes('Female') || v.name.includes('Samantha'))) ||
                            voices.find(v => v.lang === 'en-US') || voices[0];
            voicesReady = true;
            document.getElementById('voiceStatus').innerHTML = '<span class="text-success">✓ Voice ready</span>';
        } else {
            setTimeout(loadVoices, 100);
        }
    }
    if (synthesis) {
        synthesis.onvoiceschanged = loadVoices;
        loadVoices();
    }

    function speakText(text, onEnd) {
        if (!synthesis || !voicesReady) { if(onEnd) onEnd(); return false; }
        if (currentUtterance) synthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        if (selectedVoice) utterance.voice = selectedVoice;
        utterance.onend = () => { if(onEnd) onEnd(); };
        utterance.onerror = () => { if(onEnd) onEnd(); };
        currentUtterance = utterance;
        synthesis.speak(utterance);
        return true;
    }

    document.getElementById('testVoiceBtn').addEventListener('click', () => {
        if (voicesReady) {
            speakText("Hello! This is a test of the AI voice. Can you hear me clearly?");
        } else {
            alert("Voices still loading, please wait a moment.");
        }
    });

    // ========== SPEECH RECOGNITION (User speaks) ==========
    let recognition = null;
    let listening = false;

    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';
        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            document.getElementById('answerText').value = transcript;
            document.getElementById('statusArea').innerHTML = '<i class="fas fa-check-circle"></i> Answer captured: "' + transcript + '"';
            document.getElementById('statusArea').className = 'alert alert-success mb-3';
            listening = false;
        };
        recognition.onerror = function(event) {
            let msg = event.error === 'not-allowed' ? 'Microphone access denied.' : 'Error: ' + event.error;
            document.getElementById('statusArea').innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + msg;
            document.getElementById('statusArea').className = 'alert alert-danger mb-3';
            listening = false;
        };
        recognition.onend = function() {
            if (listening) {
                document.getElementById('statusArea').innerHTML = '<i class="fas fa-microphone-slash"></i> Listening stopped. Click "Speak Answer" again.';
                document.getElementById('statusArea').className = 'alert alert-warning mb-3';
                listening = false;
            }
        };
    } else {
        document.getElementById('voiceStatus').innerHTML += '<span class="text-danger"> Speech recognition not supported.</span>';
    }

    document.getElementById('testMicBtn').addEventListener('click', () => {
        if (!recognition) { alert("Speech recognition not supported. Please use Chrome."); return; }
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(() => {
                alert("Microphone is working! You can now use 'Speak Answer'.");
            })
            .catch(err => {
                alert("Microphone access denied. Please allow microphone in browser settings.");
            });
    });

    // ========== INTERVIEW LOGIC ==========
    let currentQuestion = null;
    let currentRound = "";

    function updateProgress(roundsCompleted) {
        let percent = (roundsCompleted / 4) * 100;
        document.getElementById('roundProgress').style.width = percent + '%';
        document.getElementById('roundProgress').innerText = Math.round(percent) + '%';
    }

    function loadNextQuestion() {
        fetch('/voice_interview_next')
            .then(res => res.json())
            .then(data => {
                if (data.finished) {
                    document.getElementById('completeArea').style.display = 'block';
                    document.getElementById('startArea').style.display = 'none';
                    document.getElementById('answerArea').style.display = 'none';
                    document.getElementById('resultArea').style.display = 'none';
                    document.getElementById('questionArea').style.display = 'none';
                    speakText("Congratulations! You've completed the interview. Thank you for your time.");
                    return;
                }
                if (data.type === 'round_transition') {
                    document.getElementById('roundName').innerHTML = `<span class="badge bg-info">${data.round_name}</span>`;
                    updateProgress(data.rounds_completed);
                    currentRound = data.round_name;
                    currentQuestion = data.question;
                    document.getElementById('questionText').innerHTML = data.question;
                    document.getElementById('questionMeta').innerHTML = `Question ${data.question_index} of ${data.total_in_round}`;
                    document.getElementById('answerText').value = '';
                    document.getElementById('resultArea').style.display = 'none';
                    document.getElementById('answerArea').style.display = 'block';
                    document.getElementById('statusArea').innerHTML = '<i class="fas fa-volume-up"></i> AI interviewer is speaking...';
                    document.getElementById('statusArea').className = 'alert alert-info mb-3';
                    speakText(data.round_name + ". " + data.question, () => {
                        document.getElementById('statusArea').innerHTML = '<i class="fas fa-microphone"></i> Your turn. Click "Speak Answer" or type below.';
                        document.getElementById('statusArea').className = 'alert alert-success mb-3';
                    });
                } else if (data.type === 'question') {
                    document.getElementById('roundName').innerHTML = `<span class="badge bg-info">${data.round_name}</span>`;
                    currentRound = data.round_name;
                    currentQuestion = data.question;
                    document.getElementById('questionText').innerHTML = data.question;
                    document.getElementById('questionMeta').innerHTML = `Question ${data.question_index} of ${data.total_in_round}`;
                    document.getElementById('answerText').value = '';
                    document.getElementById('resultArea').style.display = 'none';
                    document.getElementById('answerArea').style.display = 'block';
                    document.getElementById('statusArea').innerHTML = '<i class="fas fa-volume-up"></i> AI interviewer is speaking...';
                    document.getElementById('statusArea').className = 'alert alert-info mb-3';
                    speakText(data.question, () => {
                        document.getElementById('statusArea').innerHTML = '<i class="fas fa-microphone"></i> Your turn. Click "Speak Answer" or type below.';
                        document.getElementById('statusArea').className = 'alert alert-success mb-3';
                    });
                }
            });
    }

    function submitAnswer() {
        const answer = document.getElementById('answerText').value.trim();
        if (!answer) {
            document.getElementById('statusArea').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Please provide an answer.';
            document.getElementById('statusArea').className = 'alert alert-danger mb-3';
            return;
        }
        document.getElementById('statusArea').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Evaluating...';
        document.getElementById('statusArea').className = 'alert alert-info mb-3';
        fetch('/voice_interview_submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ answer: answer })
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('scoreSpan').innerHTML = data.score;
            document.getElementById('feedbackSpan').innerHTML = data.feedback;
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('answerArea').style.display = 'none';
            document.getElementById('statusArea').innerHTML = '<i class="fas fa-chart-line"></i> Answer evaluated. Click "Next Question" to continue.';
            document.getElementById('statusArea').className = 'alert alert-secondary mb-3';
            speakText(`You scored ${data.score} out of 10. ${data.feedback}`);
        });
    }

    // Event listeners
    document.getElementById('startBtn').addEventListener('click', () => {
        fetch('/voice_interview_reset', { method: 'POST' })
            .then(() => {
                document.getElementById('startArea').style.display = 'none';
                document.getElementById('completeArea').style.display = 'none';
                loadNextQuestion();
            });
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
        if (confirm('Reset interview? All progress will be lost.')) {
            fetch('/voice_interview_reset', { method: 'POST' })
                .then(() => {
                    location.reload();
                });
        }
    });

    document.getElementById('listenBtn').addEventListener('click', () => {
        if (!recognition) { alert('Speech recognition not supported. Please type.'); return; }
        if (listening) {
            recognition.stop();
            listening = false;
            document.getElementById('statusArea').innerHTML = '<i class="fas fa-stop"></i> Listening stopped.';
            document.getElementById('statusArea').className = 'alert alert-warning mb-3';
        } else {
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(() => {
                    recognition.start();
                    listening = true;
                    document.getElementById('statusArea').innerHTML = '<i class="fas fa-microphone-alt"></i> Listening... Speak clearly.';
                    document.getElementById('statusArea').className = 'alert alert-primary mb-3';
                })
                .catch(err => {
                    document.getElementById('statusArea').innerHTML = '<i class="fas fa-microphone-slash"></i> Microphone access denied.';
                    document.getElementById('statusArea').className = 'alert alert-danger mb-3';
                });
        }
    });

    document.getElementById('submitBtn').addEventListener('click', submitAnswer);
    document.getElementById('nextBtn').addEventListener('click', () => loadNextQuestion());
</script>
{% endblock %}
