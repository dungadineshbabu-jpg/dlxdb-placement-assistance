{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6"><div class="card shadow"><div class="card-header bg-primary text-white"><h4 class="mb-0">Register</h4></div><div class="card-body">
<form method="POST"><div class="mb-3"><label>Full Name</label><input type="text" name="name" class="form-control" required></div>
<div class="mb-3"><label>Email</label><input type="email" name="email" class="form-control" required></div>
<div class="mb-3 position-relative"><label>Password</label><div class="input-group"><input type="password" name="password" id="password" class="form-control" required><button class="btn btn-outline-secondary toggle-password" type="button" data-target="password"><i class="fas fa-eye"></i></button></div></div>
<div class="mb-3 position-relative"><label>Confirm Password</label><div class="input-group"><input type="password" name="confirm_password" id="confirm_password" class="form-control" required><button class="btn btn-outline-secondary toggle-password" type="button" data-target="confirm_password"><i class="fas fa-eye"></i></button></div></div>
<button type="submit" class="btn btn-primary w-100">Register</button></form>
<div class="mt-3 text-center">Already have an account? <a href="{{ url_for('login') }}">Login</a></div>
</div></div></div></div>
{% endblock %}
